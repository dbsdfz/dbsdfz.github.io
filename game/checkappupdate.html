<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<title> </title>
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<style type="text/css">
		body {margin:0;padding:0;}
		h3.zxgre {margin:0;line-height:300%;color:green;text-align: center;width:100%;}
		h3.zxred {margin:0;line-height:300%;color:red;text-align: center;width:100%;}
		h3.zxbla {margin:0;line-height:300%;color:black;text-align: center;width:100%;}
		p.zxjm {margin:0;line-height:100%;color:grey;text-align: center;width:100%;}
		a {margin-left:10px;color:darkgrey;text-decoration: none;opacity:0.8;}
	</style>
	<script>
        document.addEventListener('DOMContentLoaded', function() {
            // 拉取版本查询参数
            var urlParams = new URLSearchParams(window.location.search);
            var currentVersion = urlParams.get('version');

            if (currentVersion === '1') {
		document.getElementById('versiondiv0').style.display = 'none';
                document.getElementById('versiondiv1').style.display = 'block';
                document.getElementById('versiondiv2').style.display = 'none';
            } else if (currentVersion === '2') {
		document.getElementById('versiondiv0').style.display = 'none';
                document.getElementById('versiondiv1').style.display = 'none';
                document.getElementById('versiondiv2').style.display = 'block';
            } else {
                // 如果没有拉取到正确的version值
		document.getElementById('versiondiv0').style.display = 'block';
                document.getElementById('versiondiv1').style.display = 'none';
                document.getElementById('versiondiv2').style.display = 'none';
            }
        });
	</script>
</head>
<body>
	<div id="versiondiv0">
	<h3 class="zxbla">没有拉取到正确的版本号</h3>
	<p class="zxjm">当前版本号：LB /WB <a href="https://dbsdfz.github.io/game/checkappupdate.html">刷新</a></p>
	</div>
	<div id="versiondiv1">
	<h3 class="zxred">有新的版本！请前往https://dbsdfz.github.io/下载。</h3>
	<p class="zxjm">当前版本号：LB 0.9/WB 1.2<a href="https://dbsdfz.github.io/game/" target="_blank">去下载</a></p>
	</div>
	<div id="versiondiv2">
	<h3 class="zxgre">恭喜，您的游戏版本已经是最新！</h3>
	<p class="zxjm">当前版本号：LB 1.5/WB 1.5<a href="https://dbsdfz.github.io/game/checkappupdate.html">刷新</a></p>
	</div>
</body>
</html>
