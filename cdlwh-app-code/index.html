<head>
    <title>Chidiao APP</title>
    <meta itemprop="name" content="" />

    <meta charset="utf-8" />
    <meta name="viewport" content="initial-scale=1, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0, width=device-width,target-densitydpi=device-dpi" />
     <link rel="stylesheet" href="https://cdn.staticfile.org/twitter-bootstrap/4.3.1/css/bootstrap.min.css">
  <script src="https://cdn.staticfile.org/jquery/3.2.1/jquery.min.js"></script>
  <script src="https://cdn.staticfile.org/popper.js/1.15.0/umd/popper.min.js"></script>
  <script src="https://cdn.staticfile.org/twitter-bootstrap/4.3.1/js/bootstrap.min.js"></script>
    <link href="index.css" rel="stylesheet" type="text/css">
    <script src="https://code.createjs.com/1.0.0/createjs.min.js"></script>
    <script src="https://passport.cnblogs.com/scripts/jsencrypt.min.js"></script>
    <script src="index.js"></script>
    <style type="text/css">
             * {
       -moz-user-select: none;  
      -webkit-user-select: none;  
      -ms-user-select: none;  
      -khtml-user-select: none;  
      user-select: none; 
    } 
        .modal-dialog {margin-top:30vh;}
        .btn {background:#155BD5;font-size:16px;padding:6px 20px;}
        #welcome {background-image: none;background:black;}
    </style>
</head>

<body onLoad="init()" oncontextmenu=self.event.returnValue=false>
    <div id="GameScoreLayer" class="BBOX SHADE bgc1" style="display:none;background: black;">
        <div style="padding:5%;margin-top: 200px;color:white">
            <div id="GameScoreLayer-text" style="font-size:42px;color: yellow;"></div>
            <div id="GameScoreLayer-score" style="margin:10px 0;font-weight:normal;font-size:30px;">本轮分数</div>
            <div id="GameScoreLayer-bast" style="font-weight:normal;font-size: 30px;">历史最佳</div>
            <button type="button" class="btn btn-primary btn-lg" onclick="replayBtn()">重新开始</button>
            <button type="button" class="btn btn-primary btn-lg" onclick="window.location.href='index.html'">返回菜单</button>
            
        </div>
    </div>
    </div>
    <div id="welcome" class="SHADE BOX-M">
        <div class="welcome-bg FILL"></div>
        <div class="FILL BOX-M" style="position:absolute;top:0;left:0;right:0;bottom:0;z-index:5;">
            <div style="margin:0 8% 0 9%;">
                <div style="font-size:2.6em; color:#FEF002;text-align:center"><img src="https://13511974.s21i.faiusr.com/4/10/ABUIABAEGAAgoZarrwYo5M3tuQQw4wI4-gI.png" width="40%">
                </div><br />
                <div style="font-size:2.2em; color:#fff; line-height:1.5em;">
                    
                </div>
                <br />
                <div id="btn_group" style="display: block;">
                    <button type="button" id="ready-btn" class="btnloading btn-lg" >开始游戏</button>
                    <br><br>
                    <a data-toggle="modal" data-target="#myModal2" class="btn btn-primary btn-lg text-light">玩家排行</a>
                        <br><br>
                        
                    <button type="button" class="btn btn-secondary btn-lg" onclick="show_setting()">更多设置</button>
                    <br><br>

                </div>
                <div id="setting" style="display: none;">
                    <!-- 此为无排行榜版本，去除名字留言 -->
                    <div class="input-group mb-3" style="display: none;">
                        <div class="input-group-prepend">
                            <span class="input-group-text" id="basic-addon1">名字</span>
                        </div>
                        <input type="text" id="username" class="form-control" maxlength=8 placeholder="用于纪录排行(特殊字符会被过滤)">
                    </div>
                    <div class="input-group mb-3" style="display: none;">
                        <div class="input-group-prepend">
                            <span class="input-group-text" id="basic-addon1">留言</span>
                        </div>
                        <input type="text" id="message" class="form-control" maxlength=50 placeholder="禁广告/脏话(本项可不填)">
                    </div>
                    <div class="btn_group" style="text-align:center;">
                        
                         
                      <a href="guanyu.html" class="btn btn-primary btn-lg">关于软件</a>
                        <br><br>
                        <a data-toggle="modal" data-target="#myModal" class="btn btn-primary btn-lg text-light">检查更新</a>
                        <br><br>
                    </div>
                    <button type="button" class="btn btn-secondary btn-lg" onclick="show_btn();save_cookie();">返回主页</button>
                </div>
            </div>
        </div>
    </div>





<div class="modal fade" id="myModal" style="z-index: 99999999;">
  <div class="modal-dialog">
    <div class="modal-content">
 
      <!-- 模态框主体 -->
      <div class="modal-body" style="text-align: center;">
        <p><img src="https://13511974.s21i.faiusr.com/4/ABUIABAEGAAg7-CqrQYohO6ypwIwRjhG.png" height="75px"></p>
        <h5>您的APP已经是最新版本。</h5> <h5>客户端版本：0.2 Beta<br>网络版本：1.0</h5>
      </div>
 
      <!-- 模态框底部 -->
      <div class=" btn" data-dismiss="modal" style="text-align: center;color: white;font-size: 16px;">
      确定
      </div>
 
    </div>
  </div>
</div>



<div class="modal fade" id="myModal2" style="z-index: 99999999;">

      <!-- 模态框底部 -->

    </div>
  </div>
</div>
